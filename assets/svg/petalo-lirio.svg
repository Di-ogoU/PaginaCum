  <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#FFF9A8" flood-opacity="0.7"/>
</filter>

<linearGradient id="verdeTallo" x1="0" y1="0" x2="0" y2="400" gradientUnits="userSpaceOnUse">
  <stop offset="0%" stop-color="#7CFFB2" />
  <stop offset="50%" stop-color="#32D47C" />
  <stop offset="100%" stop-color="#0B5C38" />
</linearGradient>

