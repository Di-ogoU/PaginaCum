    <filter id="neonTallo" x="-80%" y="-80%" width="260%" height="260%">
  <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#32D47C" flood-opacity="1"/>
  <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#32D47C" flood-opacity="0.9"/>
  <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#7CFFB2" flood-opacity="0.7"/>
</filter>

<filter id="neonPetaloMorado" x="-80%" y="-80%" width="260%" height="260%">
  <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#B026FF" flood-opacity="1"/>
  <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#B026FF" flood-opacity="0.9"/>
  <feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="#7A00CC" flood-opacity="0.7"/>
</filter>

<filter id="neonAmarillo" x="-80%" y="-80%" width="260%" height="260%">
